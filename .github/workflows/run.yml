name: Smart Edge Scanner

on:
  workflow_dispatch:          # اجرای دستی با دکمه
  push:
    branches: [ main ]        # همین که فایل‌ها را بالا بدهی، فوراً یک‌بار اجرا می‌شود
  schedule:
    - cron: "0 */6 * * *"     # و بعد هر ۶ ساعت یک‌بار (UTC)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python smart_edge.py
      - uses: actions/upload-artifact@v4
        with:
          name: smart-edge-signals
          path: smart_edge_signals.csv
