name: Smart Edge Scanner

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python smart_edge.py | tee run.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smart-edge-output
          path: |
            run.log
            smart_edge_signals.csv
          if-no-files-found: warn
